    <div class="post-content">
        <p>当怀念某些事物时，这种感觉让我意识到，那个阶段，那个时间已经彻底结束了。  </p>
<p>小学暑假，在乡下池塘还没有被填平时，每次骤雨落下，荷叶上总是沾满露珠，在阳光中会闪着光，傍晚天空昏红，抬头便能看到许多红色蜻蜓，后来却不知道多少年没有再看到过这样的荷叶荷花，没有再见到蜻蜓了。  </p>
<p>现在对于夏天的记忆，不过是几阵雨而已，过去了也就过去了。  </p>
