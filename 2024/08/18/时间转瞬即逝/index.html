<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>时间转瞬即逝 - 回到森林吧</title><link rel="stylesheet" href="/css/style.css"><meta name="generator" content="Hexo 7.3.0"><link rel="alternate" href="/atom.xml" title="回到森林吧" type="application/atom+xml"></head><body><header><nav><a href="/">首页</a> <a href="/archives/">归档</a> <a href="/about/">关于</a> <a href="/rss/">订阅</a></nav><h1 class="site-title">终末地铁</h1><p class="site-description">回过神来已到达终点</p></header><main><div class="page-content"><article><h2 class="article-title">时间转瞬即逝</h2><div class="page-body"><p>当怀念某些事物时，这种感觉让我意识到，那个阶段，那个时间已经彻底结束了。</p><p>小学暑假，在乡下池塘还没有被填平时，每次骤雨落下，荷叶上总是沾满露珠，在阳光中会闪着光，傍晚天空昏红，抬头便能看到许多红色蜻蜓，后来却不知道多少年没有再看到过这样的荷叶荷花，没有再见到蜻蜓了。</p><p>现在对于夏天的记忆，不过是几阵雨而已，过去了也就过去了。</p><span id="more"></span></div></article></div></main><footer><p>© 回到森林吧 - 2025</p></footer></body></html>
